train:
  batch_size: 32
  num_epochs: 5

  optimizer_name: adamw
  learning_rate: 1.0e-4
  weight_decay: 1.0e-2

  scheduler_name: cosine
  scheduler_step_size: 10
  scheduler_gamma: 0.1
  scheduler_t_max: null
  scheduler_eta_min: 0.0

  grad_clip_norm: 1.0

objective:
  masking_ratio: 0.15
  min_masked_features: 1
  reconstruction_loss_weight: 1.0
